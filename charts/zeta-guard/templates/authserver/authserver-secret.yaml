{{- if not .Values.authserver.admin.secretRef }}
apiVersion: v1
kind: Secret
metadata:
  name: authserver-admin
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: "{{ .Values.authserver.admin.username }}"
  {{- if .Release.IsInstall }}
  password: {{ required "authserver.admin.password is required on first install" .Values.authserver.admin.password | quote }}
  {{- else if .Values.authserver.admin.password }}
  password: {{ .Values.authserver.admin.password | quote }}
  {{- else }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "authserver-admin" }}
  password: {{ index ($existingSecret.data | default dict) "password" | default "" | b64dec | quote }}
  {{- end }}
{{- end }}
---
{{- if not .Values.authserver.truststoresSecretRef }}
apiVersion: v1
kind: Secret
metadata:
  name: pdp-truststores-pw
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
type: Opaque
data:
  password: "{{ "no_secret_for_trust_only" | b64enc }}"
{{- end }}
---
{{- if not .Values.authserver.genesisHashSecretRef }}
apiVersion: v1
kind: Secret
metadata:
  name: genesis-hash
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Release.IsInstall }}
  hash: {{ required "authserver.genesisHash is required on first install" .Values.authserver.genesisHash | quote }}
  {{- else if .Values.authserver.genesisHash }}
  hash: {{ .Values.authserver.genesisHash | quote }}
  {{- else }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "genesis-hash" }}
  hash: {{ index ($existingSecret.data | default dict) "hash" | default "" | b64dec | quote }}
  {{- end }}
{{- end }}
---
{{- if not .Values.authserver.smcbHashingPepperSecretRef }}
apiVersion: v1
kind: Secret
metadata:
  name: smcb-hashing-pepper
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Release.IsInstall }}
  pepper: {{ required "authserver.smcbHashingPepper is required on first install" .Values.authserver.smcbHashingPepper | quote }}
  {{- else if .Values.authserver.smcbHashingPepper }}
  pepper: {{ .Values.authserver.smcbHashingPepper | quote }}
  {{- else }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "smcb-hashing-pepper" }}
  pepper: {{ index ($existingSecret.data | default dict) "pepper" | default "" | b64dec | quote }}
  {{- end }}
{{- end }}
