apiVersion: apps/v1
kind: Deployment
metadata:
  name: authserver
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.authserver.replicaCount }}
  selector:
    matchLabels:
      {{- include "authserver.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "authserver.labels" . | nindent 8 }}
        {{- with .Values.authserver.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.authserver.podAnnotations | or .Values.devMode }}
      annotations:
        {{- with .Values.authserver.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.devMode }}
        zeta.dev/rollout-timestamp: "{{ now | unixEpoch }}"
        {{- end }}
      {{- end }}
    spec:
      {{- if and .Values.authserver.serviceAccount .Values.authserver.serviceAccount.create }}
      serviceAccountName: {{ .Values.authserver.serviceAccount.name }}
      automountServiceAccountToken: false
      {{- end }}
      {{- with .Values.authserver.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.authserver.imagePullSecrets | default .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.authserver.hostAlias .Values.global.enableDNSRedirect }}
      hostAliases:
        {{- with .Values.authserver.hostAlias }}
        - ip: {{ .ip | quote }}
          hostnames:
            - {{ .name | quote }}
        {{- end }}
        {{- if .Values.global.enableDNSRedirect }}
          {{- template "global.tigerDNSRedirectEntryOnly" . }}
        {{- end }}
      {{- end }}
      initContainers:
        {{- if .Values.authserver.dbEnc.enabled }}
        {{- with .Values.authserver.dbEnc.initContainerProvideKeys }}
        - {{ tpl (toYaml .) $ | nindent 10 }}
        {{- end}}
        - name: keychain-generator
          image: "{{ include "keychainGenerator.image" . | trim }}"
          imagePullPolicy: "{{ .Values.authserver.dbEnc.keychainGenerator.imagePullPolicy }}"
          env:
          {{- with .Values.authserver.dbEnc.keychainFileName }}
            - name: SPREE_KEYCHAIN_FILE
              value: {{ . | quote }}
          {{- end }}
          {{- if .Values.authserver.hsm.enabled }}
            - name: HSM_PROXY_ENDPOINT
              value: {{ .Values.authserver.hsm.endpoint | quote }}
          {{- with .Values.authserver.hsm.dbEnc.keyId }}
            - name: HSM_PROXY_KEK_ID
              value: {{ . | quote }}
          {{- end }}
          {{- end }}
          {{- with .Values.authserver.dbEnc.keychainGenerator.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.authserver.dbEnc.keychainGenerator.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- with .Values.authserver.dbEnc.keychainGenerator.extraVolumeMounts }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
        {{- with .Values.authserver.dbEnc.initContainerStoreKeys }}
        - {{ tpl (toYaml .) $ | nindent 10 }}
        {{- end}}
        {{- end}}
        - name: keycloak-build
          image: "{{ include "authserver.image" . | trim }}"
          imagePullPolicy: "{{ .Values.authserver.imagePullPolicy }}"
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              cp -r /opt/keycloak/. /work/
              cd /work
              ./bin/kc.sh build
          env:
            - name: SMCB_KEYSTORE_LOCATION
              value: "/var/trust-data/smcb-trust-roots.p12"
            - name: SMCB_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserver.truststoresSecretRef | default "pdp-truststores-pw" | quote }}
                  key: password
            - name: TPM_KEYSTORE_LOCATION
              value: "/var/trust-data/tpm-trust-roots.p12"
            - name: TPM_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserver.truststoresSecretRef | default "pdp-truststores-pw" | quote }}
                  key: password
            {{- include "keycloak.buildOptions" . | nindent 12 }}
            - name: KC_DB
              value: "{{ include "authserver.kcDb" . }}"
          volumeMounts:
            - name: keycloak-home
              mountPath: /work
          {{- with .Values.authserver.initContainer.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.authserver.initContainer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: trust-anchor-provisioning-processor
          image: "{{ include "provisioningProcessor.image" . | trim }}"
          imagePullPolicy: "{{ .Values.provisioningProcessor.imagePullPolicy }}"
          {{- with .Values.provisioningProcessor.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
          - name: RESULT_DIR
            value: "/var/trust-data"
          - name: PROCESSORS_TSL_SMB_ENABLED
            value: "true"
          - name: TSL_FILENAME
            value: "ECC-RSA_TSL-test.xml"
          - name: PROCESSORS_TPM_ENABLED
            value: "true"
          - name: PROVISIONING_CONTAINER_NAME
            value: {{ .Values.provisioningProcessor.provisioningContainer | quote }}
          {{- if .Values.provisioningProcessor.provisioningContainerCaSecretRef }}
          - name: PROVISIONING_CONTAINER_REGISTRY_CA_FILE
            value: "/var/registry-ca/ca.crt"
          {{- end }}
          - name: TRUST_CERTCHAIN_FILE
            value: "/var/image-trustchain/certchain.pem"
          {{- with .Values.provisioningProcessor.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          - name: trust-data
            mountPath: "/var/trust-data"
            readOnly: false
          - name: image-trustchain
            mountPath: "/var/image-trustchain"
            readOnly: true
          - name: tmp
            mountPath: "/tmp"
            readOnly: false
          {{- if .Values.provisioningProcessor.provisioningContainerCaSecretRef }}
          - name: registry-ca
            mountPath: /var/registry-ca
            readOnly: true
          {{- end }}
      containers:
        - name: keycloak
          image: "{{ include "authserver.image" . | trim }}"
          imagePullPolicy: "{{ .Values.authserver.imagePullPolicy }}"
          {{- with .Values.authserver.container.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - start
            - --optimized
            - --db-pool-min-size={{ .Values.authserver.dbPool.minSize }}
            - --db-pool-max-size={{ .Values.authserver.dbPool.maxSize }}
            - --http-pool-max-threads={{ .Values.authserver.httpPool.maxThreads }}
            - --hostname-strict=false
            - --proxy-headers=xforwarded
            {{- if .Values.authserver.adminHostname }}
            {{- /* KC26: --hostname must be a full URL when --hostname-admin is set.
                 The path (/auth) must be explicit to preserve the context path;
                 omitting it would cause KC to drop the /auth prefix from all endpoints. */}}
            - --hostname=https://{{ .Values.authserver.hostname }}/auth
            - --hostname-admin=https://{{ .Values.authserver.adminHostname }}
            {{- else }}
            - --hostname={{ .Values.authserver.hostname }}
            {{- end }}
            - --http-access-log-enabled=true
          livenessProbe:
            httpGet:
              path: /auth-mgmt/health/live/ # align with KC_HTTP_MANAGEMENT_RELATIVE_PATH
              port: http-mgmt-port
              {{- if or .Values.authserver.hsm.tls.enabled .Values.authserver.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: {{ .Values.authserver.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.authserver.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.authserver.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /auth-mgmt/health/ready/  # align with KC_HTTP_MANAGEMENT_RELATIVE_PATH
              port: http-mgmt-port
              {{- if or .Values.authserver.hsm.tls.enabled .Values.authserver.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: {{ .Values.authserver.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.authserver.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.authserver.probes.readiness.failureThreshold }}
          startupProbe:
            httpGet:
              path: /auth-mgmt/health/ready/  # align with KC_HTTP_MANAGEMENT_RELATIVE_PATH
              port: http-mgmt-port
              {{- if or .Values.authserver.hsm.tls.enabled .Values.authserver.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: {{ .Values.authserver.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.authserver.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.authserver.probes.startup.failureThreshold }}
          env:
            # Environment variable 'KEYCLOAK_ADMIN' is deprecated, use 'KC_BOOTSTRAP_ADMIN_USERNAME' instead
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserver.admin.secretRef | default "authserver-admin" | quote }}
                  key: username
            # Environment variable 'KEYCLOAK_ADMIN_PASSWORD' is deprecated, use 'KC_BOOTSTRAP_ADMIN_PASSWORD' instead
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserver.admin.secretRef | default "authserver-admin" | quote }}
                  key: password
            - name: SMCB_KEYSTORE_LOCATION
              value: "/var/trust-data/smcb-trust-roots.p12"
            - name: SMCB_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserver.truststoresSecretRef | default "pdp-truststores-pw" | quote }}
                  key: password
            - name: TPM_KEYSTORE_LOCATION
              value: "/var/trust-data/tpm-trust-roots.p12"
            - name: TPM_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserver.truststoresSecretRef | default "pdp-truststores-pw" | quote }}
                  key: password
            {{- if .Values.devMode }}
            # Enable remote debugging in devMode
            - name: KC_DEBUG
              value: "true"
            - name: KC_DEBUG_PORT
              value: "*:5005"
            {{- end }}
            - name: KC_LOG_LEVEL
              value: "{{ .Values.authserver.log.level }}"
            {{- include "keycloak.buildOptions" . | nindent 12 }}
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: JAVA_LOCALE
              value: "-Duser.timezone=Europe/Berlin"
            - name: JAVA_OPTS_APPEND
              value: >
                -ea
                -XX:MaxRAMPercentage=70
                -XX:MinRAMPercentage=70
                -XX:InitialRAMPercentage=50
                -XX:MetaspaceSize=96M
                -XX:MaxMetaspaceSize=256m
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
            {{- if .Values.authServerLogConsoleOutput | eq "json" }}
            - name: KC_LOG_CONSOLE_JSON_FORMAT
              value: "ecs"
            {{- end }}
            - name: KC_LOG_CONSOLE_OUTPUT
              value: {{ quote .Values.authServerLogConsoleOutput }}
            - name: KC_TELEMETRY_ENDPOINT
              value: "http://{{ include "telemetryGateway.hostname" . }}:4317"
            - name: KC_TELEMETRY_RESOURCE_ATTRIBUTES
              value: "service.version={{ .Values.authserver.image.tag }}"
            - name: KC_TELEMETRY_SERVICE_NAME
              value: "ZETA Guard PDP authorization server"
            # OPA endpoints and behavior
            # Configure ZETA SMC-B token-exchange provider and OPA toggle
            - name: KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_OPA_ENABLED
              value: "{{ .Values.authserver.provider.smcB.opa.enabled }}"
            - name: KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_OPA_BASE_URL
              value: "{{ .Values.authserver.provider.smcB.opaBaseUrl }}"
            - name: KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_OPA_SIMULATION_BASE_URL
              value: "{{ .Values.authserver.provider.smcB.opaSimulationBaseUrl }}"
            - name: KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_DECISION_PATH
              value: "{{ .Values.authserver.provider.smcB.decisionPath }}"
            - name: KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_CONNECTION_TIMEOUT_MS
              value: "{{ .Values.authserver.provider.smcB.connectionTimeoutMs }}"
            - name: KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_READ_TIMEOUT_MS
              value: "{{ .Values.authserver.provider.smcB.readTimeoutMs }}"
            - name: KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_FAIL_CLOSED
              value: "{{ .Values.authserver.provider.smcB.failClosed }}"
            # https://www.keycloak.org/docs/latest/upgrading/#maximum-length-of-the-parameters-in-the-oidc-token-endpoint
            - name: KC_SPI_LOGIN_PROTOCOL_OPENID_CONNECT_REQ_PARAMS_DEFAULT_MAX_SIZE
              value: "10000"
            - name: SMCB_USER_MAX_CLIENTS
              value: "{{ .Values.authserver.config.maxClients }}"
            - name: CLIENT_REGISTRATION_TTL
              value: "{{ .Values.authserver.config.clientRegistrationTTL }}"
            - name: CLIENT_REGISTRATION_SCHEDULER_INTERVAL
              value: "{{ .Values.authserver.config.clientRegistrationSchedulerInterval }}"
            {{- if .Values.authserver.hsm.enabled }}
            - name: HSM_PROXY_ENDPOINT
              value: {{ .Values.authserver.hsm.endpoint | quote }}
            - name: HSM_PROXY_KEY_ID
              value: {{ .Values.authserver.hsm.tls.keyId | quote }}
            {{- if .Values.authserver.dbEnc.enabled }}
            {{- with .Values.authserver.hsm.dbEnc.keyId }}
            - name: HSM_PROXY_KEK_ID
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.authserver.dbEnc.keychainFileName }}
            - name: SPREE_KEYCHAIN_FILE
              value: {{ . | quote }}
            {{- end }}
            - name: SPREE_INTEGRITY_ENABLED
              value: {{ .Values.authserver.dbEnc.enabled | toString | quote }}
            - name: SPREE_ENCRYPTED_REALM
              value: "zeta-guard"
            - name: SPREE_BOOTSTRAP_INTERVAL
              value: {{ .Values.authserver.dbEnc.bootstrapInterval | quote }}
            - name: SPREE_BOOTSTRAP_ATTEMPTS
              value: {{ .Values.authserver.dbEnc.bootstrapAttempts | toString | quote }}
            - name: SPREE_SHUTDOWN_ON_ERROR
              value: "true"
            {{- end }}
            {{- if .Values.authserver.hsm.tokenSigning.enabled }}
            - name: HSM_PROXY_TOKEN_KEY_ID
              value: {{ .Values.authserver.hsm.tokenSigning.keyId | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.authserver.hsm.tls.enabled }}
            # pod-level TLS via HSM-backed HSMPROXY KeyStore
            # startup.sh generates /opt/keycloak/conf/hsm-keystore.properties from HSM_PROXY_* env vars
            - name: KC_HTTPS_KEY_STORE_TYPE
              value: "HSMPROXY"
            - name: KC_HTTPS_KEY_STORE_FILE
              value: "/opt/keycloak/conf/hsm-keystore.properties"
            - name: KC_HTTPS_KEY_STORE_ALIAS
              value: "tls"
            {{- else if .Values.authserver.tls.enabled }}
            # pod-level TLS via cert/key mounted from a Kubernetes Secret
            - name: KC_HTTPS_CERTIFICATE_FILE
              value: "/opt/keycloak/conf/tls/tls.crt"
            - name: KC_HTTPS_CERTIFICATE_KEY_FILE
              value: "/opt/keycloak/conf/tls/tls.key"
            {{- end }}
            # Initial hash for admin events log
            - name: GENESIS_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserver.genesisHashSecretRef | default "genesis-hash" | quote }}
                  key: hash
            - name: SMCB_HASHING_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserver.smcbHashingPepperSecretRef | default "smcb-hashing-pepper" | quote }}
                  key: pepper
            # DB wiring switches by databaseMode value (cloudnative|external)
            {{- if eq .Values.databaseMode "cloudnative" }}
            # CloudNativePG-backed DB
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              value: {{ .Values.cloudnativeDbUrl | quote }}
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudnativeDbSecretName | quote }}
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudnativeDbSecretName | quote }}
                  key: password
            - name: KC_DB_SCHEMA
              value: {{ .Values.cloudnativeDbSchema | quote }}
            {{- else }}
            # DB settings for external DB
            - name: KC_DB
              value: {{ .Values.authserverDb.kcDb | quote }}
            - name: KC_DB_URL
              value: {{ .Values.authserverDb.kcDbUrl | quote }}
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserverDb.kcDbSecretName | quote }}
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authserverDb.kcDbSecretName | quote }}
                  key: password
            - name: KC_DB_SCHEMA
              value: {{ .Values.authserverDb.kcDbSchema | quote }}
            {{- end }}
            {{- if .Values.global.infinispanExternal.enabled }}
            {{- if and .Values.global.infinispanExternal.remote.host .Values.global.infinispanExternal.remote.port }}
            - name: KC_CACHE_REMOTE_HOST
              value: {{ .Values.global.infinispanExternal.remote.host }}
            - name: KC_CACHE_REMOTE_PORT
              value: {{ .Values.global.infinispanExternal.remote.port }}
            {{- else }}
            - name: KC_CACHE_REMOTE_HOST
              value: infinispan
            - name: KC_CACHE_REMOTE_PORT
              value: "11222"
            {{- end }}
            - name: KC_CACHE_REMOTE_USERNAME
              valueFrom:
                secretKeyRef:
                  {{- if .Values.global.infinispanExternal.admin.secretName }}
                  name: {{ .Values.global.infinispanExternal.admin.secretName }}
                  {{- else }}
                  name: infinispan-admin
                  {{- end }}
                  key: username
            - name: KC_CACHE_REMOTE_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.global.infinispanExternal.admin.secretName }}
                  name: {{ .Values.global.infinispanExternal.admin.secretName }}
                  {{- else }}
                  name: infinispan-admin
                  {{- end }}
                  key: password
            - name: KC_CACHE_REMOTE_TLS_ENABLED
              value: "false"
            {{- end }}
          ports:
            - containerPort: 8080 # align with KC_HTTP_PORT
              name: http-port
            - containerPort: 9000 # align with KC_HTTP_MANAGEMENT_PORT
              name: http-mgmt-port
            - containerPort: 7800
              name: jgroups
            - containerPort: 57800
              name: jgroups-fd
            {{- if or .Values.authserver.hsm.tls.enabled .Values.authserver.tls.enabled }}
            - containerPort: 8443
              name: https-port
            {{- end }}
            {{- if .Values.devMode }}
            - containerPort: 5005
              name: jdwp
            {{- end }}
          volumeMounts:
            - name: keycloak-home
              mountPath: /opt/keycloak
            - name: trust-data
              mountPath: "/var/trust-data"
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.authserver.tls.enabled }}
            - name: tls-cert
              mountPath: /opt/keycloak/conf/tls
              readOnly: true
            {{- end }}
            {{- with .Values.authserver.container.extraVolumeMounts }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- with .Values.authserver.container.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: keycloak-home
          emptyDir: {}
        - name: trust-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: image-trustchain
          secret:
            secretName: {{ required "SecretRef for image verification certchain is missing, see imageTrustCertchainSecretRef" .Values.imageTrustCertchainSecretRef }}
        {{- with .Values.provisioningProcessor.provisioningContainerCaSecretRef }}
        - name: registry-ca
          secret:
            secretName: {{ .name }}
            items:
              - key: {{ .key }}
                path: ca.crt
        {{- end }}
        {{- if .Values.authserver.tls.enabled }}
        - name: tls-cert
          secret:
            secretName: {{ .Values.authserver.tls.certSecretName }}
        {{- end }}
        {{- with .Values.authserver.extraVolumes }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- with .Values.authserver.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.authserver.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
