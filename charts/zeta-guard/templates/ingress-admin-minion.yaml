{{- /* vim: set ft=helm: */ -}}
{{- /* Routes /auth on the admin hostname directly to authserver.
     No PEP enforcement, no admin blocking — this hostname is for Terraform / CI/CD. */ -}}
{{- if and .Values.ingressEnabled .Values.authserver.adminHostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zeta-guard-admin-minion
  labels:
    {{- include "ingress.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.nginxIngressEnabled }}
    nginx.org/mergeable-ingress-type: "minion"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - host: {{ .Values.authserver.adminHostname | quote }}
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: authserver
                port:
                  {{- if or .Values.authserver.hsm.tls.enabled .Values.authserver.tls.enabled }}
                  name: https
                  {{- else }}
                  name: http
                  {{- end }}
{{- end }}
