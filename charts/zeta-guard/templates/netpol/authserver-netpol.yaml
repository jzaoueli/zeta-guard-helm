{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: authserver-egress
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "authserver.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # kube-dns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # telemetry-gateway (OTLP gRPC)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - port: 4317
          protocol: TCP
    {{- if .Values.opa.enabled }}
    # OPA (policy decisions)
    - to:
        - podSelector:
            matchLabels:
              {{- include "opa.selectorLabels" . | nindent 14 }}
      ports:
        - port: 8181
          protocol: TCP
    {{- end }}
    {{- if and .Values.opa.enabled .Values.opa.simulation.enabled }}
    # OPA simulation
    - to:
        - podSelector:
            matchLabels:
              {{- include "opaSimulation.selectorLabels" . | nindent 14 }}
      ports:
        - port: 8181
          protocol: TCP
    {{- end }}
    {{- if eq .Values.databaseMode "cloudnative" }}
    # CloudNativePG PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: keycloak-db
      ports:
        - port: 5432
          protocol: TCP
    {{- end }}
    {{- if .Values.global.infinispanExternal.enabled }}
    # Infinispan (distributed cache)
    - to:
        - podSelector:
            matchLabels:
              app: infinispan
      ports:
        - port: 11222
          protocol: TCP
    {{- end }}
    # Keycloak JGroups clustering (direct pod-to-pod, no DNAT — podSelector works)
    - to:
        - podSelector:
            matchLabels:
              {{- include "authserver.selectorLabels" . | nindent 14 }}
      ports:
        - port: 7800
          protocol: TCP
    {{- $telemetry := .Values.networkPolicy.egress.telemetry.ipBlocks }}
    {{- $siem := .Values.networkPolicy.egress.siem.ipBlocks }}
    {{- $ocsp := .Values.networkPolicy.egress.ocspSmcbTsp.ipBlocks }}
    {{- $gar := .Values.networkPolicy.egress.artifactRegistry.ipBlocks }}
    {{- $pgar := .Values.networkPolicy.egress.providerArtifactRegistry.ipBlocks }}
    {{- $external := concat $telemetry $siem $ocsp $gar $pgar | uniq }}
    {{- if $external }}
    # External: gematik telemetry, SIEM, SMC-B TSP OCSP,
    #           artifact registries (provisioning-processor init container)
    - to:
        {{- range $external }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- end }}
{{- end }}
