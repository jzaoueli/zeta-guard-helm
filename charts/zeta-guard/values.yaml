global:
  imagePullSecrets: [ ]
  registry_host: "europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/"
  infinispanExternal: {}

registry_name: ""

# additionalLabels is a map of labels added to each zeta-guard resource.
additionalLabels: {}

authserver:
  dbEnc:
    enabled: false
    bootstrapInterval: "PT20S"
    bootstrapAttempts: 15
    keychainGenerator:
      resources:
        limits:
          cpu: "500m"
          memory: "256Mi"
        requests:
          cpu: "100m"
          memory: "128Mi"
      extraVolumeMounts: []
      imagePullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: authserver
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  initContainer:
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      capabilities:
        drop: [ "ALL" ]
    resources:
      limits:
        cpu: "2"
        memory: "2Gi"
      requests:
        cpu: "500m"
        memory: "512Mi"
  container:
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop: [ "ALL" ]
    resources:
      limits:
        cpu: "8"
        memory: "4Gi"
      requests:
        cpu: "4"
        memory: "4Gi"
    extraVolumeMounts: []
  extraVolumes: []
  replicaCount: 1
  hostname: ""
  # When set, /auth/admin is blocked via the PEP proxy and a dedicated admin
  # ingress is created. Terraform/CI must use this hostname for keycloak_url.
  adminHostname: ""
  # TLS secret for the admin ingress. Defaults to "zeta-guard-admin-tls".
  # For local/KIND environments reuse the main cert by setting this to "zeta-guard-tls"
  # and adding the adminHostname to issuers.local.dnsNames.
  adminTlsSecretName: ""
  # Seed value for the admin-event hash chain (GENESIS_HASH env var).
  # Required on first install (helm install); leave empty on upgrades — the chart
  # reads the existing cluster Secret automatically via lookup and leaves it unchanged.
  # To rotate: set an explicit value during helm upgrade. Warning: changing this
  # value breaks the integrity of the admin-event hash chain.
  # Recommended format: 64-char hex string, e.g. $(openssl rand -hex 32)
  genesisHash:
  image:
    repository: keycloak-zeta
    tag: 1.0.1
  imagePullPolicy: Always
  imagePullSecrets: [ ]
  # authserver.podLabels is a map of labels to add to the authserver pod.
  podLabels: {}
  # Provider configuration for ZETA SMC-B token-exchange implementation
  provider:
    smcB:
      opa:
        enabled: true
      opaBaseUrl: "http://opa:8181"
      opaSimulationBaseUrl: "http://opa-simulation:8181"
      decisionPath: "/v1/data/policies/zeta/authz/decision"
      connectionTimeoutMs: 1000
      readTimeoutMs: 2000
      failClosed: true
  # Secret pepper for SMC-B user hashes (SMCB_HASHING_PEPPER env var).
  # Required on first install (helm install); leave empty on upgrades — the chart
  # reads the existing cluster Secret automatically via lookup and leaves it unchanged.
  # To rotate: set an explicit value during helm upgrade. Warning: changing this
  # value invalidates all existing SMC-B user hashes.
  # Recommended format: UUID, e.g. $(uuidgen)
  smcbHashingPepper:
  admin:
    username: admin
    password:
  hsm:
    # enabled activates the HSM Proxy connection at authserver startup (sets HSM_PROXY_ENDPOINT).
    # When false, the HsmProxyKeycloakFactory SPI is a no-op and no HSM is required at runtime.
    enabled: false
    endpoint: ""  # gRPC address of the HSM Proxy, e.g. "hsm-sim:50051"
    dbEnc: {}
    tls:
      # Pod-level HTTPS on port 8443 using an HSM-backed key.
      # Requires authserver.hsm.enabled: true and a running HSM Proxy.
      # startup.sh generates /opt/keycloak/conf/hsm-keystore.properties from HSM_PROXY_* env vars automatically.
      enabled: false
      keyId: ""  # TLS key ID in the HSM, e.g. "zeta-guard-keycloak-tls-es256-v1.p256"
    tokenSigning:
      # JWT token signing (access, ID, refresh tokens) via HSM-backed ES256 key.
      # Requires authserver.hsm.enabled: true. The realm must also set defaultSignatureAlgorithm: ES256.
      # The KeyProvider component is registered via Terraform (make config), not by the plugin itself.
      enabled: false
      keyId: ""  # Token signing key ID in the HSM, e.g. "zeta-guard-keycloak-token-es256-v1.p256"
  tls:
    # pod-level HTTPS on port 8443 using a cert/key from a Kubernetes Secret.
    # The Secret must contain keys tls.crt and tls.key (standard kubernetes.io/tls format).
    enabled: false
    # certSecretName is the name of the Kubernetes Secret holding tls.crt and tls.key.
    certSecretName: ""
  config:
    maxClients: "256"
    clientRegistrationTTL: "PT5M"
    clientRegistrationSchedulerInterval: "PT2M"
  # Mostly for test setup purposes.
  # Adds an entry to the authserver's host file, mapping hostAlias.ip to hostAlias.name
  hostAlias: { }
  dbPool:
    minSize: 25
    maxSize: 150
  httpPool:
    maxThreads: 200
  log:
    level: "INFO"
  # podAnnotations is for setting additional Kubernetes Annotations to a Pod.
  podAnnotations: {}
  probes:
    liveness:
      initialDelaySeconds: 0
      periodSeconds: 15
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 5
    startup:
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 20
  affinity: {}
  tolerations: []

# authServerLogConsoleOutput sets the log output to JSON or default (plain) unstructured logging
authServerLogConsoleOutput: json

# authServerMetricsEnabled enables the metrics endpoint for Keycloak
authServerMetricsEnabled: true

# authServerTracingEnabled enables the OpenTelemetry tracing
authServerTracingEnabled: true

pepproxy:
  serviceAccount:
    create: true
    name: pep-proxy
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  replicaCount: 1
  image:
    repository: ngx_pep
    tag: 1.0.1
  imagePullPolicy: Always
  imagePullSecrets: [ ]
  # pepproxy.podLabels is a map of labels to add to the pepproxy pod.
  podLabels: {}
  resources:
    limits:
      cpu: "2"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "200Mi"
  wellKnownBase: http://localhost
  # boolean that controls if ASL should be enabled (true) or not (false)
  asl_enabled: false
  #
  #aslRootCA: "GEM.RCA7 TEST-ONLY"
  #
  # specify an override OCSP URL to use instead of certificate default, or "off" to disable stapling
  # aslOcsp: "http://example.org/ocsp"
  #
  # change maximum validity of cached OCSP responses (default 24h per A_24624-01)
  # alsOcspTtl: 5m
  #
  nginxConf:
    configMapName: pep-nginx-conf
    generateConfigMap: false

    httpClientAcceptInvalidCerts: false

    # enables ASL test mode. This will practically disable encryption! NEVER USE IN PRODUCTION!
    aslTestmode: false

    # enable (true) or disable (false) no-travel enforcement
    noTravel: false

    # fachdienstUrl defines the fachdienst url to be used for the pep-proxy.
    fachdienstUrl: ""

    # JWKS issuer for PoPP key validation.
    # If set, all locations default to `pep_require_popp on;`.
    # Set to null to disable PoPP.
    poppIssuer: null

    # quarter: within the current quarter (see gemSpec_ZETA — A_26477)
    # duration string: fixed validity period, since iat + optional unit (d,h,m,s); e.g. "1d"
    #                  defaults to s if no unit given.
    poppValidity: quarter

    # OIDC issuer (iss) of the authorization server (e.g., zeta-guard-realm).
    pepIssuer: ""

    # requiredAudience defines the audience required for a valid access token.
    requiredAudience: ""

    # requiredScopes defines scopes required for a valid access token.
    requiredScopes: [ ]
    locations: ""
  # set to gRPC URL of HSM Proxy to enable ossl_hsm integration
  hsmProxyAddr: null
  # podAnnotations is for setting additional Kubernetes Annotations to a Pod.
  podAnnotations: {}
  affinity: {}
  tolerations: []

# pepproxyMetricsEnabled enables the metrics endpoint for Keycloak
pepproxyMetricsEnabled: true

# pepproxyMetricsExporterImage is required if pepproxyMetricsEnabled is true
# using a fixed version of the "edge" tag since the latest release 1.5.1 has vulnerabilities
pepproxyMetricsExporterImage: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/nginx-prometheus-exporter:1.5.1-zeta1

# pepproxyTracingEnabled enables tracing for nginx
pepproxyTracingEnabled: true

# When true, the ingress routes traffic to the tiger-proxy service
# instead of directly exposing internal services.
routeViaTigerProxy: false

# When enabled, injects a changing annotation to force pod rollouts
# on each helm upgrade/apply even if image tag is unchanged.
devMode: false

# DB mode switch:
# - cloudnative: managed by CloudNativePG operator
# - external: use external db by providing values authserverDb.kcDb, authserverDb.kcDbUrl, authserverDb.kcDbSchema,
#       authserverDb.kcDbSecretName
#       The db username and password are pulled from the respective field of a secret going by the provided name.
#       The other properties behave according to the keycloak environment variables.
#       See https://www.keycloak.org/server/db
authserverDb:
  kcDb: postgres
databaseMode: cloudnative
# CloudNativePG DB connection settings used when databaseMode=cloudnative.
cloudnativeDbUrl: "jdbc:postgresql://keycloak-db-rw:5432/keycloak"
cloudnativeDbSecretName: "keycloak-db-app"
cloudnativeDbSchema: "public"

# CloudNativePG settings used when databaseMode=cloudnative.
# WARNING: instances=1 is only suitable for development/test environments.
# For production use instances >= 3 to avoid a single point of failure.
cloudnativePg:
  instances: 1
  imageName: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/postgres:17.9-standard-trixie
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  storage:
    size: 10Gi

# Which cert-manager ClusterIssuer to use for TLS on the Ingress (default)
clusterIssuer: ""

# If gematikConnectionEnabled is true, the CronJob gematik-oidc-token-renewer-cronjob is deployed and will maintain a valid access token in the Secret gematik-oidc-token
gematikConnectionEnabled: true

gematik:
  # workloadIdentityFederation contains configuration for Google Workload Identity Federation
  workloadIdentityFederation:
    # The project number of the project that contains the workload identity pool
    projectNumber: ""
    # The ID of the workload identity pool
    poolId: ""
    # The ID of the workload identity pool provider
    workloadIdentityProvider: ""

  # serviceAccountEmailAddress refers to a Google service account to be impersonated
  serviceAccountEmailAddress: ""
  # idTokenAudience is the audience claim used in generateIdToken (gematik-oidc-token-renewer-cronjob).
  # Typically, the OAuth 2.0 Client ID of the IAP-protected BDE data receiver.
  idTokenAudience: "833409780574-lilt6qf6lli28r16b72q3p8epefop2gr.apps.googleusercontent.com"

# IngressClass used by the generated Ingress.
# - With the bundled NIC: keep equal to nginx-ingress.controller.ingressClass.name.
# - With an external controller: disable the bundled NIC and set this to your class (e.g., gce, openshift-default).
ingressClassName: "nginx"

# If ingressEnabled is true, Ingresses are deployed.
ingressEnabled: true
ingressMasterAnnotations: { }
ingressMinionAnnotations: { }
ingress:
  sessionAffinity:
    enabled: false  # set to true when replicaCount > 1; uses ip-hash (X-Forwarded-For) via NIC

# If nginxIngressEnabled is true, the nginx-ingress controller is deployed and Ingresses receive annotations.
nginxIngressEnabled: true
# When true, disable spec.tls of the master ingress to enable custom TLS configuration via ingressMasterAnnotations.\"nginx.org/server-snippets\", as required for ossl_hsm support
nginxIngressHsm: false

nginx-ingress:
  controller:
    readOnlyRootFilesystem: true
    # NIC v5.4.0+ uses /tmp for thread-local temp files
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    # We use standard Kubernetes Ingress; disable NIC CRDs to avoid CRD install requirement
    enableCustomResources: false
    ingressClass:
      name: nginx
    image:
      repository: "europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/nginx-ingress"
      tag: 1.0.1
    service:
      # Default for standalone/cloud installs.
      type: LoadBalancer
      externalTrafficPolicy: Cluster
    pod:
      annotations:
        # Bump on HSM/TLS-related config changes to force a NIC pod restart —
        # nginx -s reload does not re-init OpenSSL providers (e.g. ossl_hsm).
        config-rev: "2026-04-29-ecdsa-strict"
    config:
      entries:
        # AFOs: GS-A_5035, GS-A_4387, A_18464, GS-A_4385, A_18467
        ssl-protocols: "TLSv1.3 TLSv1.2"
        # AFOs: A_17322, A_21275-01, A_17124-03, GS-A_5016; (GS-A_4384-03 omitted)
        ssl-ciphers: "TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:@SECLEVEL=3"
        # AFOs: GS-A_4359-02, GS-A_4357-02
        ssl-ecdh-curve: "secp384r1:prime256v1:brainpoolP512r1:brainpoolP384r1:brainpoolP256r1"
        # AFOs: GS-A_5322 - disable server side cache, use client tickets only
        ssl-session-cache: "none"
        # ssl_session_ticket_key (not specified, default) - use random generated keys with hourly rotation
        ssl-session-tickets: "on"
        ssl-session-timeout: "5m"
        # ssl_stapling off (default) - A_26964 omitted, since LetsEncrypt does not provide OCSP anymore
        ssl-stapling: "off"
        # AFOs: A_17775 - use client order
        ssl-prefer-server-ciphers: "false"
        # AFOs: GS-A_5526 - renegotiation disabled by default since v0.8.23
    resources:
      limits:
        cpu: "2"
        memory: "1Gi"
      requests:
        cpu: "250m"
        memory: "200Mi"
opa:
  enabled: true
  # opa.podLabels is a map of labels to add to the opa pod.
  podLabels: {}
  replicaCount: 1
  serviceAccountName: ""
  image:
    repository: opa
    tag: 1.14.1-static
  imagePullPolicy: IfNotPresent
  imagePullSecrets: [ ]
  # Set OPA server log level: debug|info|warn|error (default: info)
  logLevel: info
  # If enabled, OPA will log decision logs to console.
  logDecisions: true
  # If enabled, OPA will log status updates to console.
  logStatusUpdates: false
  # Bundle mode (disabled by default) — inline policyRego is used when disabled
  bundle:
    enabled: false
    # Logical service name used in OPA config (e.g., 'gitlab-registry' or 'local-proxy')
    serviceName: registry
    # Base URL of registry
    url: ""
    # fully qualified resource (including the registry host)
    resource: ""
    credentials:
      # Reference a Secret containing registry bearer credentials.
      secretRef:
        # Name of the Secret in the release namespace that holds credentials
        name: ""
    polling:
      min_delay_seconds: 60
      max_delay_seconds: 60
    # Signature verification for OPA bundles
    verification:
      enabled: true
      # set in env-specific values
      keyId: ""
      algorithm: ""
      # Optional: must match the scope embedded in the bundle signature. Omit if bundle was signed without a scope.
      scope: ""
  simulation:
    enabled: true
    replicaCount: 1
    bundle:
      # Optional explicit simulation bundle resource. If empty, chart derives from active resource.
      resource: ""
  # Workload Identity Federation (AKS → GCP STS) for GAR access
  workloadIdentityFederation:
    enabled: false
    sts:
      # GPC service-account (email format)
      sa: ""

    tokenRenewer:
      enabled: true
      # Default schedule: refresh every 45 minutes
      # Immediately get token: kubectl -n NAMESPACE create job token-renewer-once --from=cronjob/opa-token-renewer-cronjob
      schedule: "*/45 * * * *"
      # Number of retries for failed Jobs spawned by the CronJob
      backoffLimit: 5

    # opa.workloadIdentityFederation.worker is required if opa.workloadIdentityFederation.enabled is true
    worker:
      image: google/cloud-sdk:549.0.0
      imagePullPolicy: IfNotPresent
      imagePullSecrets: [ ]
      resources:
        limits:
          cpu: "250m"
          memory: "200Mi"
        requests:
          cpu: "50m"
          memory: "50Mi"

  # --- Example: Workload Identity Federation (WIF) ---
  #
  # WIF mode (AKS → GCP STS → GAR)
  # serviceAccountName: opa
  # bundle:
  #   enabled: true
  #   serviceName: gar
  #   url: https://<region>-docker.pkg.dev
  #   resource: <PROJECT_ID>/<REPO>/<IMAGE>:<TAG>
  #   credentials:
  #     secretRef:
  #       name: ""   # keep empty in WIF mode
  #    verification:
  #      enabled: true
  #      keyId: zeta_artifact_reg
  #      algorithm: ES256
  # workloadIdentityFederation:
  #   enabled: true
  #   sts:
  #     # Use the provider resource name, for example:
  #     # //iam.googleapis.com/projects/<PROJECT_ID>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
  #     audience: ""
  #     iamUrl: "https://iamcredentials.googleapis.com"
  #     sa: ""
  #     scope: "https://www.googleapis.com/auth/cloud-platform"
  #     tokenUrl: "https://sts.googleapis.com/v1/token"
  #   tokenRenewer:
  #     schedule: "*/45 * * * *"
  #
  # --- Examples: GitLab/Basic mode (deploy-token) ---
  # bundle:
  #   enabled: true
  #   serviceName: gitlab
  #   url: https://registry.example.com:443
  #   resource: registry.example.com/group/project/policy-bundle:latest
  #   credentials:
  #     secretRef:
  #       name: opa-bearer   # Secret with token='USERNAME:PASSWORD', scheme='Basic'
  health:
    liveness:
      periodSeconds: 20
    readiness:
      periodSeconds: 20
  resources:
    limits:
      cpu: "2"
      memory: "1Gi"
    requests:
      cpu: "100m"
      memory: "200Mi"
  # podAnnotations is for setting additional Kubernetes Annotations to a Pod.
  podAnnotations: {}
  affinity: {}
  tolerations: []

# Optional: Install CloudNativePG operator in the same namespace (namespace-scoped)
# Enabled by default so each namespace manages its own operator instance.
# CRDs remain cluster-scoped and are installed once (the first time the
# operator is installed in any namespace).

# opaDistributedTracingEnabled enables distributed tracing with a gRPC endpoint
opaDistributedTracingEnabled: true

# If opaStatusPrometheus is true, export the status (bundle and plugin) metrics to prometheus
opaStatusPrometheus: true

# OPA policy/data configuration for Keycloak→OPA showcase
opaPolicy:
  # Default fake policy: allow-all decision object.
  # The policies will be loaded from PIP and PAP Service (workload identity federation or secretRef)
  policyRego: |
    package policies.zeta.authz

    # Minimal decision object compatible with callers expecting
    # data.policies.zeta.authz.decision => {"allow": bool, "ttl": {"access_token": number, "refresh_token": number}}
    decision := {
      "allow": true,
      "ttl": {
        "access_token": 300,
        "refresh_token": 86400,
      },
    }

# Use OpenShift Ingress Route-Controller with tls; will create edge-terminiated routes with tls-redirect
openshiftIngress:
  enabled: false
  certName: ""

provisioningProcessor:
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    capabilities:
      drop: [ "ALL" ]
  image:
    repository: provisioning-processor
    tag: 1.0.0
  imagePullPolicy: Always
  provisioningContainer: "europe-west3-docker.pkg.dev/gematik-pt-zeta-test/zeta-provisioning/zeta-guard-provisioning:latest"
  resources:
    limits:
      cpu: "1"
      memory: "200Mi"
    requests:
      cpu: "100m"
      memory: "100Mi"

# telemetryGatewayEnabled adds the telemetry gateway to the helm release
telemetryGatewayEnabled: true

telemetry-gateway:
  mode: deployment
  image:
    repository: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/zeta-telemetry-gateway
    tag: "v0.151.0-release.2"
    digest: "sha256:762feb0150d823e046325abf5f896d068cbadada7a8ee086faccb2f04d91fa59"
  command:
    name: /otelcol/zeta-telemetry-gateway
  resources:
    limits:
      cpu: "4"
      memory: "2Gi"
    requests:
      cpu: "100m"
      memory: "200Mi"
  config:
    connectors:
      count/siem:
        logs:
          attack.detection.count:
            description: The number of detected attacks
            conditions:
              - 'attributes["bridge.name"] == "de.gematik.zeta.zetaguard.keycloak.commons.server.AttackDetectionLogger"'
            attributes:
              - key: 'attributes["attackDetection.capecId"]'
                default_value: "unknown capec id"

    exporters:
      otlp_grpc/gematik:
        endpoint: https://otlp.v1.bd.prod.ccs.gematik.solutions:443
        auth:
          authenticator: bearertokenauth/gematik

    extensions:
      bearertokenauth/gematik:
        filename: "/etc/gcp/token"

    processors:
      filter/ti_siem:
        error_mode: ignore
        log_conditions:     # ToDo align conditions with ZETA specification when released
          - resource.attributes["service.name"] == "none"
        metric_conditions:  # ToDo align conditions with ZETA specification when released
          - resource.attributes["service.name"] == "none"
        trace_conditions:   # ToDo align conditions with ZETA specification when released
          - resource.attributes["service.name"] == "none"
      redaction/betreiber:
        # by default, keep all attributes
        allow_all_keys: true
        # remove attributes with keys matching these patterns
        blocked_key_patterns:
          - ".*token.*"
        # redact these patterns inside attribute values
        blocked_values:
          ### A_25744 - ZETA Guard - Datenschutzkonformes Logging und Monitoring
          # taken from https://github.com/stefanboeck/privacylight/blob/main/privacylight/detection.py
          # email addresses
          - '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}'
          # IBAN
          - '[A-Z]{2}\d{2}[A-Z0-9]{10,30}'
          # credit card numbers
          - '\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}'
          # German phone numbers
          - '(?:\+49|0049|0)[\s-]?1[5-7]\d[\s-]?\d{7,8}'

          ### A_25745 - ZETA Guard - Keine medizinischen Informationen in Logging und Monitoring

          ### A_25746 - ZETA Guard - Keine sicherheitsrelevanten Daten in Logging und Monitoring
          # JWT
#          - '([a-zA-Z0-9_=]+)\.([a-zA-Z0-9_=]+)\.([a-zA-Z0-9_\-\+\/=]*)'
          # The following patterns are taken from https://help.nightfall.ai/detection_platform/regex_library
          # ECDSA Private Key
          - '^-----BEGIN ECDSA PRIVATE KEY-----\s.*,ENCRYPTED(?:.|\s)+?-----END ECDSA PRIVATE KEY-----$'
          # SSL Certificate
          - '^-----BEGIN CERTIFICATE-----(?:.|\n)+?\s-----END CERTIFICATE-----$'

          ### mixed bag of patterns
          - '^[a-zA-Z0-9_+&*-]+(?:\.[a-zA-Z0-9_+&*-]+)*@(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,7}$'
          - '^([0-9a-zA-Z\-=_]{20,})\.([0-9a-zA-Z\-_=]{3,})\.([0-9a-zA-Z\-_=]*)$'
          - 'eyJ[A-Za-z0-9-_=]+?\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*'
          - >
            client_(id|secret)['"\s:=]+[a-zA-Z0-9\-_.~]{10,100}
          - 'AKIA[0-9A-Z]{16}'
          - >
            aws(.{0,20})?(?-i)['"]?[0-9A-Za-z\/+]{40}['"]?
          - 'AIza[0-9A-Za-z\-_]{35}'
          - 'ghp_[0-9a-zA-Z]{36}'
          - 'glpat-[0-9a-zA-Z-_]{20}'
          - 'xox[baprs]-([0-9a-zA-Z]{10,48})?'
          - 'sk_live_[0-9a-zA-Z]{24}'
          - 'pk_live_[0-9a-zA-Z]{24}'
          - 'SK[0-9a-fA-F]{32}'
          - 'SG\.[\w\d\-_]{22}\.[\w\d\-_]{43}'
          - 'sl\.[A-Za-z0-9_-]{20,100}'
          - 'shpat_[0-9a-fA-F]{32}'
          - 'EAACEdEose0cBA[0-9A-Za-z]+'
          - >
            [ hH ]eroku['"][0-9a-f]{32}['"]
          - 'dop_v1_[a-z0-9]{64}'
          - '0/[0-9a-z]{32}'
          - 'lin_api_[a-zA-Z0-9]{40}'
          - '\d{9}:[a-zA-Z0-9_-]{35}'
          - >
            mongodb(\+srv)?:\/\/[^\s'"/]+
          - >
            postgres(?:ql)?:\/\/[^\s'"/]+
          - >
            mysql:\/\/[^\s'"/]+
          - >
            redis:\/\/[^\s'"/]+
          - >
            elasticsearch:\/\/[^\s'"/]+
          - >
            jdbc:\w+:\/\/[^\s'"/]+
          - '[A-Za-z]:\\(?:[^\\\n\r]+\\)*[^\\\n\r\.]+\.[\w]+'
          - >
            (username|user|email)['"\s:=]+[^\s'"@]{1,100}['"].*?(password|pwd)['"\s:=]+[^\s'" ]{4,100}
          - '\b\d{1,5}\s*(?:[A-Za-zÀ-ÿ0-9.-]+\s+)*(?:Straße|Str\.|Strasse|Street|St\.|Road|Rd\.|Avenue|Ave\.|Boulevard|Blvd\.|Lane|Ln\.|Weg|Alle[e]?|Gasse|Place|Pl\.|Drive|Dr\.|Court|Ct\.|Square|Sq\.|Parkway|Pkwy\.)\b'
        # don't change attributes with keys matching these patterns
        ignored_key_patterns:
          - '^app\.kubernetes\.io\/.+'
          - '^container\..+'
          - '^k8s\..+'
          - '^net\..+'
          - '^log\..+'
          - '^otel\..+'
          - '^service\..+'
        ignored_keys:
          - http.user_agent
        redact_all_types: true
        summary: info

    receivers:
      opa/policy_engine:
        endpoint: 0.0.0.0:49152
        service_name: "ZETA Guard PDP policy engine"
      opa/policy_engine_simulation:
        endpoint: 0.0.0.0:49153
        service_name: "ZETA Guard PDP policy engine (simulation)"
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: authserver
              metrics_path: /auth-mgmt/metrics  # align with KC_HTTP_MANAGEMENT_RELATIVE_PATH
              scrape_interval: 5s
              static_configs:
                # align with KC_HTTP_MANAGEMENT_PORT
                - targets: [ authserver:9000 ]

            - job_name: opa
              scrape_interval: 5s
              static_configs:
                - targets: [ opa:8181 ]

            - job_name: policy-execution-point
              scrape_interval: 5s
              static_configs:
                - targets: [ pep-proxy-svc:9113 ]

            - job_name: telemetry-gateway
              scrape_interval: 5s
              static_configs:
                - targets: [ "${env:MY_POD_IP}:8888" ]
      syslog/http_proxy:
        udp:
          listen_address: "${env:MY_POD_IP}:54526"
        protocol: rfc3164
        location: UTC
        resource:
          "service.name": "ZETA Guard PEP HTTP proxy"

    service:
      extensions:
        - bearertokenauth/gematik
        - health_check
      pipelines:
        logs:
          receivers:
            - opa/policy_engine
            - opa/policy_engine_simulation
            - otlp
            - syslog/http_proxy
          exporters:
            - otlp_grpc/gematik
        logs/ti_siem:
          receivers:
            - opa/policy_engine
            - opa/policy_engine_simulation
            - otlp
            - syslog/http_proxy
          processors:
            - memory_limiter
            - filter/ti_siem
            - redaction/betreiber
            - batch
          exporters:
            - count/siem
            - debug # replace with otlp_http/ti_siem when endpoint is available
        metrics:
          receivers:
            - otlp
            - prometheus
          exporters:
            - debug
        metrics/ti_siem:
          receivers:
            - count/siem
            - otlp
            - prometheus
          processors:
            - memory_limiter
            - filter/ti_siem
            - redaction/betreiber
            - batch
          exporters:
            - debug # replace with otlp_http/ti_siem when endpoint is available
        traces:
          receivers:
            - otlp
          exporters:
            - otlp_grpc/gematik
        traces/ti_siem:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - filter/ti_siem
            - redaction/betreiber
            - batch
          exporters:
            - debug # replace with otlp_http/ti_siem when endpoint is available

  extraVolumeMounts:
    - name: gcp-token
      mountPath: /etc/gcp
      readOnly: true
  extraVolumes:
    - name: gcp-token
      secret:
        secretName: gematik-oidc-token

  ports:
    jaeger-compact:
      enabled: false
    jaeger-thrift:
      enabled: false
    jaeger-grpc:
      enabled: false
    opa-push:
      enabled: true
      containerPort: 49152
      servicePort: 49152
      hostPort: 49152
      protocol: TCP
    opa-sim-push:
      enabled: true
      containerPort: 49153
      servicePort: 49153
      hostPort: 49153
      protocol: TCP
    syslog:
      enabled: true
      containerPort: 54526
      servicePort: 54526
      hostPort: 54526
      protocol: UDP
    zipkin:
      enabled: false
  additionalLabels:
    app.kubernetes.io/part-of: zeta-guards

# ---------------------------------------------------------------------------
# Egress NetworkPolicies (A_27864-01)
# ---------------------------------------------------------------------------
# When enabled, each ZETA Guard pod gets an egress NetworkPolicy that restricts
# outbound traffic to explicitly listed IP blocks. Internal cluster communication
# (DNS, pod-to-pod) is always allowed via pod/namespace selectors.
# Ports are not restricted in this release (Phase 1 — IP-only).
networkPolicy:
  enabled: false

  egress:
    # A_27864-01 — gematik Telemetriedaten-Empfänger (OTLP-Endpunkt)
    telemetry:
      ipBlocks: [ ]
    # A_27864-01 — SIEM der gematik
    siem:
      ipBlocks: [ ]
    # A_27864-01 — ZETA Artifact Registry bei gematik (image pull, OPA bundles)
    artifactRegistry:
      ipBlocks: [ ]
    # A_27864-01 — Provider-interne Artifact Registry
    providerArtifactRegistry:
      ipBlocks: [ ]
    # A_27864-01 — OCSP/CRL für TLS TSPs nach CAB Forum
    ocspCabForum:
      ipBlocks: [ ]
    # A_27864-01 — SMC-B TSP OCSP Responder
    ocspSmcbTsp:
      ipBlocks: [ ]
    # A_27864-01 — OCSP Responder TSP Komponenten PKI der TI
    ocspTiPki:
      ipBlocks: [ ]
    # PIP — Quelle der OPA Policy Bundles
    pip:
      ipBlocks: [ ]
    # PoPP Dienst
    popp:
      ipBlocks: [ ]
      mock: false  # allow egress to local popp-mock pod (app=popp-mock); uses podSelector + targetPort 8080
    # Anbieter-interner Verkehr
    providerInternal:
      allowAll: false  # true = gesamter Egress erlaubt (kein IP-Filter)
      resourceServers:
        ipBlocks: [ ]
      telemetrySystems:
        ipBlocks: [ ]
      # podSelectors: allow egress to cluster-local pods by label (post-DNAT, kindnet pattern).
      # Each entry: {matchLabels: {<label>: <value>}, port: <targetPort>}
      # Use for test-only cluster-local backends (e.g. testfachdienst in local KIND stages).
      podSelectors: [ ]
