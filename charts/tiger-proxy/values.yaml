global:
  imagePullSecrets: []
  registry: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/
  registry_host: "europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/"

registry_name: ""

replicaCount: 1

# When enabled, injects a changing annotation to force pod rollouts
# on each helm upgrade/apply even if image tag is unchanged.
devMode: false

image:
  tag: latest
  repository: testproxy
imagePullPolicy: Always

nginxSidecar:
  image:
    registry: ""
    repository: nginxinc/nginx-unprivileged
    tag: "alpine3.22-slim"
  imagePullPolicy: IfNotPresent
  resources: {}
  # resources:
  #   limits:
  #     cpu: "200m"
  #     memory: "128Mi"
  #   requests:
  #     cpu: "50m"
  #     memory: "64Mi"

resources: {}
# resources:
#   limits:
#     cpu: "900m"
#     memory: "1Gi"
#   requests:
#     cpu: "500m"
#     memory: "512Mi"

serviceAccount:
  create: true
  name: tiger-proxy

podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext: {}
#  allowPrivilegeEscalation: false
#  readOnlyRootFilesystem: true
#  runAsNonRoot: true
#  capabilities:
#    drop: [ "ALL" ]

proxyConfig:
  proxyPort: 8080
  adminPort: 9999
  otlpHttpClientMaxBodySize: 64m
  proxyLogLevel: INFO
  activateRbelParsing: true
  parsingShouldBlockCommunication: false
  fileSaveInfo:
    writeToFile: false
    fileName: "tiger.log"

  proxyRoutes:
    - from: /testfachdienst
      to: https://testfachdienst:443
    - from: /auth
      to: http://authserver/auth
    - from: /proxy
      to: http://testdriver/proxy
    - from: /opa
      to: http://opa:8181
    - from: /.well-known/openid-federation
      to: http://popp-statics/.well-known/openid-federation
    - from: /.well-known/signed-jwks
      to: http://popp-statics/.well-known/signed-jwks
    - from: /popp
      to: http://popp-statics
    - from: /
      to: http://pep-proxy-svc
  tls: {}

startup:
  livenessProbe:
    url: /actuator/health
    port: 9999
    initialDelaySeconds: 60
  readinessProbe:
    url: /actuator/health
    port: 9999
    initialDelaySeconds: 60
  failureThreshold: 30
  startupPeriodSeconds: 30

service:
  type: ClusterIP
  annotations: {}
  ports:
    proxy: 80
    admin: 9999
  nodePorts:
    proxy: null
    admin: null
  tls: []
