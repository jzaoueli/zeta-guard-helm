global:
  imagePullSecrets: []
  registry: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/
  registry_host: "europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/"

registry_name: ""

image:
  repository: exauthsim
  tag: "latest"
imagePullPolicy: Always

replicaCount: 1

containerPort: 8080

service:
  port: 80
  portName: http

hostname: ""

# When enabled, injects a changing annotation to force pod rollouts
# on each helm upgrade/apply even if image tag is unchanged.
devMode: false

serviceAccount:
  create: true
  name: exauthsim

resources: {}
# resources:
#   limits:
#     cpu: "2"
#     memory: "1Gi"
#   requests:
#     cpu: "500m"
#     memory: "512Mi"

podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext: {}
#  allowPrivilegeEscalation: false
#  readOnlyRootFilesystem: true
#  runAsNonRoot: true
#  capabilities:
#    drop: [ "ALL" ]
