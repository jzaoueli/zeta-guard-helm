global:
  imagePullSecrets: []
  registry: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/
  registry_host: "europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/"

registry_name: ""

image:
  repository: nativedriver-image
  tag: v1.0.1
imagePullPolicy: Always

containerPort: 8091

fachdienst_url: ""

# Token used by the test-driver to call POPP-protected endpoints
PoppToken: ""

# When enabled, injects a changing annotation to force pod rollouts
# on each helm upgrade/apply even if image tag is unchanged.
devMode: false

# When true, the ingress routes traffic to the tiger-proxy service
# instead of directly exposing internal services.
routeViaTigerProxy: false

# Ingress settings (used when deploying a NIC minion Ingress for the test-driver)
ingressClassName: "nginx"

# Path to the PKCS12 keystore file containing the SMC-B certificate
smcbCertificateFileName: ""

# The SM-B keystore (PKCS12) Base64 encoded
smcbCertificateB64: ""

# Alias of the certificate within the PKCS12 keystore
smcbCertificateAlias: ""
