apiVersion: apps/v1
kind: Deployment
metadata:
  name: popp-mock
  labels:
    component: popp-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popp-mock
  template:
    metadata:
      labels:
        app: popp-mock
        component: popp-mock
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.tokenGenerator.imagePullSecrets | default .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        {{- if .Values.tokenGenerator.enabled }}
        - name: popp-token-generator
          image: "{{ default (printf "%s%s" .Values.global.registry_host .Values.registry_name) .Values.tokenGenerator.image.registry }}{{ .Values.tokenGenerator.image.repository }}:{{ .Values.tokenGenerator.image.tag }}"
          imagePullPolicy: "{{ .Values.tokenGenerator.imagePullPolicy }}"
          env:
            - name: spring_profiles_active
              value: default,docker
            - name: SERVER_PORT
              value: "8090"
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: {{ .Values.tokenGenerator.ingress.path | default "/popp-token-generator" | quote }}
            {{- with .Values.tokenGenerator.poppIssuerUrl }}
            - name: POPP_ISSUER_URL
              value: {{ . | quote }}
            {{- end }}
          ports:
            - containerPort: 8090
          volumeMounts:
            - name: token-generator-tmp
              mountPath: /tmp
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        - name: popp-statics
          {{- $poppStatics := .Values.poppStatics | default dict }}
          {{- $image := $poppStatics.image | default dict }}
          image: "{{ $image.registry | default "" }}{{ $image.repository | default "nginxinc/nginx-unprivileged" }}:{{ $image.tag | default "alpine3.22-slim" }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: signed-jwks-file
              mountPath: "/usr/share/nginx/html/.well-known/signed-jwks"
              subPath: "signed-jwks"
              readOnly: true
            - name: openid-federation-file
              mountPath: "/usr/share/nginx/html/.well-known/openid-federation"
              subPath: "openid-federation"
              readOnly: true
            - name: jwks-file
              mountPath: "/usr/share/nginx/html/jwks.json"
              subPath: "jwks.json"
              readOnly: true
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.tokenGenerator.enabled }}
        - name: token-generator-tmp
          emptyDir: { }
        {{- end }}
        - name: nginx-tmp
          emptyDir: { }
        - name: nginx-cache
          emptyDir: { }
        - name: signed-jwks-file
          configMap:
            name: popp-jwks-file
            items:
              - key: signed_jwks
                path: "signed-jwks"
        - name: openid-federation-file
          configMap:
            name: popp-jwks-file
            items:
              - key: openid-federation
                path: "openid-federation"
        - name: jwks-file
          configMap:
            name: popp-jwks-file
            items:
              - key: jwks
                path: "jwks.json"
---
