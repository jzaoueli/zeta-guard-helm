# Minimal defaults to support helm lint without env-specific files


# Global defaults used by subcharts; keep safe empties
global:
  imagePullSecrets: []
  registry: ""
  registry_host: ""
  enableDNSRedirect: false
  dns: {} 
  infinispanExternal:
    enabled: false
    replicaCount: 3
    image:
      repository: infinispan/server
      tag: "15.2"
    serviceAccount:
      create: true
      name: infinispan
    resources: {}
    podDisruptionBudget:
      enabled: false
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      capabilities:
        drop: [ "ALL" ]
    extraJavaOptions: ""
    remote:
      host:
      port:
    admin:
      username: "please set me"
      password: "please set me"
      secretName:
    config: |-
      <infinispan xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="urn:infinispan:config:15.0 https://infinispan.org/schemas/infinispan-config-15.0.xsd
                            urn:infinispan:server:15.0 https://infinispan.org/schemas/infinispan-server-15.0.xsd" xmlns="urn:infinispan:config:15.0" xmlns:server="urn:infinispan:server:15.0">
        <cache-container name="default" statistics="true">
            <transport cluster="${infinispan.cluster.name:cluster}" stack="${infinispan.cluster.stack:tcp}" node-name="${infinispan.node.name:}" />
            <security>
                <authorization />
            </security>
        </cache-container>
        <server xmlns="urn:infinispan:server:15.0">
            <interfaces>
                <interface name="public">
                    <inet-address value="${infinispan.bind.address:127.0.0.1}" />
                </interface>
            </interfaces>
            <socket-bindings default-interface="public" port-offset="${infinispan.socket.binding.port-offset:0}">
                <socket-binding name="default" port="${infinispan.bind.port:11222}" />
            </socket-bindings>
            <security>
                <security-realms>
                    <security-realm name="default">
                        <!-- Uncomment to enable TLS on the realm -->
                        <!-- server-identities>
                      <ssl>
                         <keystore path="server.pfx"
                                   password="password" alias="server"
                                   generate-self-signed-certificate-host="localhost"/>
                      </ssl>
                   </server-identities-->
                        <properties-realm />
                    </security-realm>
                </security-realms>
            </security>
            <endpoints socket-binding="default" security-realm="default" />
        </server>
        <cache-container name="keycloak">
            <replicated-cache name="work" statistics="true">
                <encoding media-type="application/x-protostream" />
            </replicated-cache>
            <distributed-cache name="sessions" statistics="true">
                <encoding media-type="application/x-protostream" />
            </distributed-cache>
            <distributed-cache name="authenticationSessions" statistics="true">
                <encoding media-type="application/x-protostream" />
            </distributed-cache>
            <distributed-cache name="clientSessions" statistics="true">
                <encoding media-type="application/x-protostream" />
            </distributed-cache>
            <distributed-cache name="offlineSessions" statistics="true">
                <encoding media-type="application/x-protostream" />
            </distributed-cache>
            <distributed-cache name="offlineClientSessions" statistics="true">
                <encoding media-type="application/x-protostream" />
            </distributed-cache>
            <distributed-cache name="actionTokens" statistics="true">
                <encoding media-type="application/x-protostream" />
            </distributed-cache>
            <distributed-cache name="loginFailures" statistics="true">
                <encoding media-type="application/x-protostream" />
            </distributed-cache>
        </cache-container>
      </infinispan>

# Keep tags empty by default; env files can enable as needed
tags: { }

exauthsim:
  serviceAccount:
    create: true
    name: exauthsim
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

zetaTlsTestToolServiceEnabled: false

zeta-tls-test-tool-service: { }

zetaCertValidationMockEnabled: false

zeta-cert-validation-mock: { }

hsmsim:
  enabled: false

# Safe defaults for cert-manager issuers to avoid nil pointer lookups
issuers:
  local:
    enabled: false
    issuerName: local-selfsigned
    certificateName: zeta-guard-local-tls
    secretName: zeta-guard-tls
    commonName: ""
    dnsNames: [ ]
    duration: 8760h

popp-mocks:
  enabled: false
  # Needed when poppIssuer points to popp-statics (JWKS), or adjust /popp target + poppIssuer to your JWKS endpoint.

testdriver:
  serviceAccount:
    create: true
    name: testdriver
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

nativedriver:
  serviceAccount:
    create: true
    name: nativedriver
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

testfachdienst: { }

# If testMonitoringServiceEnabled is true, observability backends are added to the deployment.
testMonitoringServiceEnabled: false

testMonitoringService:
  # The OpenTelemetry demo is not configured for production use. You need to
  # adjust resource requests and limits of Grafana and Prometheus for long-term
  # use.
  opentelemetry-demo:
    grafana:
      rbac:
        namespaced: true
    jaeger:
      jaeger:
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
        livenessProbe:
          failureThreshold: 6
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 6
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        startupProbe:
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 5
    opentelemetry-collector:
      resources:
        requests:
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 2Gi
      config:
        exporters:
          otlp:
            sending_queue:
              queue_size: 100
          otlphttp/prometheus:
            endpoint: http://prometheus:9090/prometheus/api/v1/otlp
        service:
          pipelines:
            traces:
              exporters:
                - otlp
                - spanmetrics
            metrics:
              exporters:
                - otlphttp/prometheus
            logs:
              exporters:
                - opensearch
    prometheus:
      server:
        prefixURL: "/prometheus"
        # Environments should override baseURL with their public host.
        extraFlags:
          - web.enable-otlp-receiver
        resources:
          requests:
            # should be 1.5x of Prometheus' `storage.local.target-heap-size` (default 2GiB)
            memory: 3Gi
          limits:
            memory: 6Gi

zeta-guard:
  authserver:
    dbEnc:
      keychainGenerator:
        image:
          repository: vau/keychain-generator
          tag: latest
    image:
      tag: main
    container:
      resources:
        limits:
          cpu: "4"
          memory: "4Gi"
        requests:
          cpu: "2"
          memory: "4Gi"
  authServerLogConsoleOutput: default
  authServerMetricsEnabled: true
  authServerTracingEnabled: true
  cloudnativePg:
    imageName: ghcr.io/cloudnative-pg/postgresql:17.9-standard-trixie
  gematikConnectionEnabled: false
  # Name of the Kubernetes Secret containing the gematik certificate chain for
  # verifying the cosign signature of the provisioning data image. The Secret
  # must have a key 'certchain.pem' holding a PEM-encoded X.509 certificate
  # chain (CA and intermediate certs, no leaf cert). Required — the Helm chart
  # fails without this value.
  # See: Referenz_des_Helm_Charts.md#cosign-vertrauenskette-für-image-verifikation
  imageTrustCertchainSecretRef: gematik-image-signer-test
  nginx-ingress:
    controller:
      image:
        tag: main
  opa:
    image:
      registry: docker.io/
      repository: openpolicyagent/opa
  opaDistributedTracingEnabled: true
  opaStatusPrometheus: false
  openshiftRoute:
    enabled: false
  provisioningProcessor:
    image:
      tag: main
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop: [ "ALL" ]
  pepproxy:
    image:
      tag: main
    nginxConf:
      configMapName: pep-test-nginx-conf

      # fachdienstUrl value has to be aligned with tags.tiger-proxy state
      # see docs/how-to_guides/How_to_configure_tiger-proxy.md for reference
      fachdienstUrl: "https://tiger-proxy:80/testfachdienst"
      # fachdienstUrl: "https://testfachdienst:443"

      httpClientAcceptInvalidCerts: true
      aslTestmode: true

      # poppIssuer value has to be aligned with tags.tiger-proxy state
      # see docs/how-to_guides/How_to_configure_tiger-proxy.md for reference
      poppIssuer: "http://tiger-proxy/popp"
      # poppIssuer: http://popp-statics

      locations: |-
        {{- $fd := .Values.pepproxy.nginxConf.fachdienstUrl -}}
        location /achelos_testfachdienst/ws/ {
            proxy_pass {{ $fd }}/achelos_testfachdienst/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        }
        location /achelos_testfachdienst/ws {
            proxy_pass {{ $fd }}/achelos_testfachdienst/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        }
        location /pep/ {
            proxy_pass {{ $fd }}/;
            proxy_ssl_verify off;

            {{- if .Values.openshiftIngress.enabled }}
            proxy_set_header Cookie ""; # do not pass OpenShift-session-cookies
            {{- end }}
        }
        location /pep/achelos_testfachdienst/ws/ {
            proxy_pass {{ $fd }}/achelos_testfachdienst/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        
            # SECURITY WARNING: This will make this location public and it can be called without the ASL protocol.
            # This is ok and desired for this test setup.
            # If you want to copy this behaviour, make sure this is permitted by the spec of your resource server.
            satisfy all;
            allow all;
        }
        location /pep/achelos_testfachdienst/ws {
            proxy_pass {{ $fd }}/achelos_testfachdienst/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        
            # SECURITY WARNING: This will make this location public and it can be called without the ASL protocol.
            # This is ok and desired for this test setup.
            # If you want to copy this behaviour, make sure this is permitted by the spec of your resource server.
            satisfy all;
            allow all;
        }
  pepproxyMetricsExporterImage: nginx/nginx-prometheus-exporter@sha256:0bf30a7c0ec24554a87063905f505a4ae4ea49043eab68f03660474512ba5fc8
  pepproxyMetricsEnabled: true
  pepproxyTracingEnabled: true
  telemetryGatewayEnabled: true
  telemetry-gateway:
    config:
      service:
        extensions:
          - health_check
        pipelines:
          logs:
            exporters:
              - debug
          metrics:
            exporters:
              - debug
          traces:
            exporters:
              - debug
    extraVolumeMounts: [ ]
    extraVolumes: [ ]

smcb_keystore:
  keystore: "please set me"
  password: "please set me"
